<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>重定向中...</title>
  <script>
    (function() {
      // 获取当前路径，处理 GitHub Pages 的仓库名前缀
      var path = window.location.pathname;
      var repoName = '/visityunfu';
      
      // 保存当前完整 URL
      sessionStorage.setItem('spa_redirect', window.location.href);
      
      // 检测是否在 GitHub Pages（路径包含仓库名）
      if (path.indexOf(repoName) === 0) {
        // GitHub Pages：跳转到根路径 + hash 标记
        window.location.replace(window.location.origin + repoName + '/?redirect=' + encodeURIComponent(path));
      } else {
        // Vercel 或其他：跳转到根路径
        window.location.replace(window.location.origin + '/?redirect=' + encodeURIComponent(path));
      }
    })();
  </script>
</head>
<body>
  <p>页面跳转中...</p>
</body>
</html>
