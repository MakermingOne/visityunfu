<!doctype html>
<html lang="en">
  <head>
    <!-- 动态设置 base URL -->
    <script>
      (function() {
        var path = window.location.pathname;
        var base = document.createElement('base');
        base.href = path.indexOf('/visityunfu') === 0 ? '/visityunfu/' : '/';
        document.head.appendChild(base);
      })();
    </script>
    
    <!-- SPA 路由修复 -->
    <script>
      (function() {
        var redirectPath = sessionStorage.getItem('spa_redirect');
        if (redirectPath) {
          sessionStorage.removeItem('spa_redirect');
          history.replaceState(null, null, redirectPath);
          return;
        }
        var params = new URLSearchParams(window.location.search);
        var redirect = params.get('redirect');
        if (redirect) {
          history.replaceState(null, null, window.location.pathname + window.location.hash);
          if (window.history && window.history.pushState) {
            history.pushState(null, null, redirect);
          }
        }
      })();
      if (typeof window.tr === 'undefined') {
        window.tr = function(key) { return key; };
      }
    </script>
    
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visit Yunfu - 云浮文旅</title>
    
    <!-- 预加载 Hero 图片 - 提高首屏加载速度 -->
    <link rel="preload" href="./images/common/hero-1.jpg" as="image" fetchpriority="high">
    <link rel="preload" href="./images/common/hero-2.jpg" as="image" fetchpriority="high">
    
    <!-- 主资源 -->
    <script type="module" crossorigin src="./assets/index-DRhF-XhE.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DWFOa5Ul.css">
    
    <!-- 性能优化：图片加载优化 -->
    <style>
      /* 图片加载占位 */
      img { max-width: 100%; height: auto; }
      img[src=""], img:not([src]) { 
        background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%); 
        background-size: 200% 100%; 
      }
      /* Hero 图片优先显示 */
      img[fetchpriority="high"] { content-visibility: auto; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- 首页增强：交通网络按钮 + 区县卡片 -->
    <script src="./scripts/page-enhance.js"></script>
    
    <!-- 地理交通页面：区县卡片 -->
    <script src="./scripts/geography.js"></script>
  </body>
</html>
